<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LockedIn</title>
</head>
<body>
    <header>
        <div class="heading">
            <img src="./assets/lockedin-logo.svg" alt="Brain with Padlock" class="logo">
            <h1>LockedIn</h1>
        </div>
        <div class="credits">
            <button class="credits-btn">Credits</button>
            <a class="github-repo-link" href="https://github.com/marquitos150/locked-in">
                <img src="assets/github-white-icon.svg" alt="GitHub Repo" class="github-icon">
                <p>GitHub</p>
            </a>
        </div>
    </header>
    <aside>
        <ul class="primary-list">
            <li class="inbox">Inbox</li>
            <li class="today">Today</li>
            <li class="week">This Week</li>
            <li class="month">This Month</li>
        </ul>
        <div class="projects-heading">
            <h2>Projects</h2>
            <button><h2>+</h2></button>
        </div>
        <ul class="project-list"></ul>
    </aside>
    <main>
        <div class="todo-list">
            <div class="todo-list-header">
                <h2 class="project-name"></h2>
                <div class="project-options">
                    <button class="todo-btn">+ Add Task</button>
                    <button class="filters">Sort by: </button>
                </div>
            </div>
            <ul class="todos"></ul>
        </div>
    </main>
    <dialog id="popup-form" closedby="none">
        <div class="dialog-header">
            <h1>Add Task</h1>
        </div>
        <form method="dialog">
            <label for="title">
                Title:
                <span class="required">*</span>
            </label>
            <input type="text" id="title" name="title" required>
            <label for="description">Description:</label>
            <input type="text" id="description" name="description">
            <label for="due-date">
                Due Date:
                <span class="required">*</span>
            </label>
            <input type="datetime-local" id="due-date" name="due-date" min="2026-06-01T08:30" required>
            <label for="priority">Select Priority:</label>
            <select id="priority" name="priority">
                <option value="high" class="high">High</option>
                <option value="medium" selected class="medium">Medium</option>
                <option value="low" class="low">Low</option>
            </select>
            <button type="submit">Create</button>
        </form>
    </dialog>
</body>
</html>
